
<!DOCTYPE html>
<html lang="fr" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MZ+ Elite System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            fontFamily: { sans: ['Inter', 'sans-serif'] },
            animation: {
              'bell-ring': 'ring 3s ease-in-out infinite',
              'fade-in': 'fade-in 0.4s ease-out forwards',
              'slide-down': 'slide-down 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards',
            },
            keyframes: {
              ring: {
                '0%, 100%': { transform: 'rotate(0)' },
                '5%, 15%, 25%': { transform: 'rotate(15deg)' },
                '10%, 20%, 30%': { transform: 'rotate(-15deg)' },
              },
              'fade-in': {
                'from': { opacity: '0', transform: 'translateY(10px)' },
                'to': { opacity: '1', transform: 'translateY(0)' },
              },
              'slide-down': {
                'from': { opacity: '0', transform: 'translateY(-20px)' },
                'to': { opacity: '1', transform: 'translateY(0)' },
              }
            }
          }
        }
      }
    </script>
    <style>
      body { 
        margin: 0; 
        overflow-x: hidden; 
        background-color: #050505; 
        color: #f5f5f5;
      }
      
      ::-webkit-scrollbar { width: 6px; }
      ::-webkit-scrollbar-track { background: #050505; }
      ::-webkit-scrollbar-thumb { background: #222; border-radius: 10px; }
    </style>
    <script>
      // Protect window.fetch from being overwritten by polyfills
      (function() {
        const originalFetch = window.fetch;
        try {
          Object.defineProperty(window, 'fetch', {
            get: function() { return originalFetch; },
            set: function() { console.warn('MZ+ System: Blocked attempt to overwrite window.fetch'); },
            configurable: true,
            enumerable: true
          });
          // Also polyfill global for libraries that expect it
          window.global = window;
        } catch (e) {
          console.warn('MZ+ System: Could not protect window.fetch', e);
        }
      })();
    </script>
    <script type="importmap">
{
  "imports": {
    "react": "https://esm.sh/react@19.0.0",
    "react-dom": "https://esm.sh/react-dom@19.0.0",

    "lucide-react": "https://esm.sh/lucide-react@0.460.0?deps=react@19.0.0",
    "@supabase/supabase-js": "https://esm.sh/@supabase/supabase-js@2.46.1",
    "react/": "https://esm.sh/react@19.0.0/",
    "react-dom/": "https://esm.sh/react-dom@19.0.0/",
    "motion/react": "https://esm.sh/motion@12.34.3/react",
    "@google/genai": "https://esm.sh/@google/genai@1.35.0"
  }
}
</script>

</head>

  </body>
</html>
